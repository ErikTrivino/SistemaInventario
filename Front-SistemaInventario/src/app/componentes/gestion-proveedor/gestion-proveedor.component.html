<div class="container mt-5">
  <div class="card">
    <div class="card-header ps-5 pt-4 pb-4">
      <h5 class="mb-0">
        <i class="fa-solid fa-truck me-3"></i>Gestión de Proveedores
      </h5>
    </div>

    <div class="card-body p-5">
      <div class="mb-4 flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="flex gap-2">
          <button type="button" routerLink="/crear-proveedor" class="inline-flex items-center gap-2 px-4 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-all shadow-sm">
            <i class="fa-solid fa-plus text-sm"></i>
            <span>Nuevo Proveedor</span>
          </button>

          <button type="button" class="inline-flex items-center gap-2 px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-lg transition-all shadow-sm disabled:opacity-50 disabled:grayscale"
            (click)="toggleEstadoSelec()" [disabled]="seleccionados.length === 0">
            <i class="fa-solid fa-toggle-on text-sm"></i>
            <span>Cambiar Estado {{ textoBtnAccion }}</span>
          </button>
        </div>

        <div class="flex items-center gap-3 bg-slate-100 dark:bg-slate-800 p-1 rounded-lg border border-slate-200 dark:border-slate-700">
          <button (click)="mostrarTodos = false; cargar()" 
                  [class.bg-white]="!mostrarTodos" [class.shadow-sm]="!mostrarTodos" [class.text-blue-600]="!mostrarTodos"
                  [class.bg-transparent]="mostrarTodos" [class.text-slate-500]="mostrarTodos"
                  class="px-4 py-1.5 rounded-md text-sm font-medium transition-all focus:outline-none">
            Activos
          </button>
          <button (click)="mostrarTodos = true; cargar()" 
                  [class.bg-white]="mostrarTodos" [class.shadow-sm]="mostrarTodos" [class.text-blue-600]="mostrarTodos"
                  [class.bg-transparent]="!mostrarTodos" [class.text-slate-500]="!mostrarTodos"
                  class="px-4 py-1.5 rounded-md text-sm font-medium transition-all focus:outline-none">
            Todos
          </button>
        </div>
      </div>

      <div class="rounded-xl w-100 overflow-hidden border border-slate-200 dark:border-slate-700 shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="bg-slate-50 dark:bg-slate-800/50">
              <tr>
                <th style="width: 40px;" class="ps-4"></th>
                <th class="text-xs font-bold uppercase tracking-wider text-black py-4">Proveedor</th>
                <th class="text-xs font-bold uppercase tracking-wider text-black">NIT / Identificación</th>
                <th class="text-xs font-bold uppercase tracking-wider text-black">Contacto</th>
                <th class="text-xs font-bold uppercase tracking-wider text-black">Estado</th>
                <th class="text-xs font-bold uppercase tracking-wider text-black pe-4">Acción</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-200 dark:divide-slate-700">
              <tr *ngFor="let p of proveedores; trackBy: trackById" class="hover:bg-slate-50/50 dark:hover:bg-slate-800/50 transition-colors">
                <td class="ps-4">
                  <input #check type="checkbox" (change)="seleccionar(p, check.checked)" 
                         class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 dark:bg-gray-700 dark:border-gray-600" />
                </td>
                <td class="py-4">
                  <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded shadow-sm bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-400 font-bold">
                      <i class="fas fa-building text-lg"></i>
                    </div>
                    <div>
                      <div class="font-bold text-black dark:text-white">{{ p.razonSocial }}</div>
                      <div class="text-xs text-black font-medium tracking-tight">{{ p.email }}</div>
                    </div>
                  </div>
                </td>
                <td>
                  <div class="inline-flex items-center px-2 py-1 bg-slate-100 dark:bg-slate-800 rounded text-xs font-mono text-black dark:text-slate-400 border border-slate-200 dark:border-slate-700">
                    {{ p.nitRut }}
                  </div>
                </td>
                <td>
                  <div class="flex flex-col gap-1">
                    <div class="flex items-center gap-2 text-sm text-black dark:text-slate-400">
                      <i class="fas fa-user text-[10px] w-3"></i>
                      <span>{{ p.contacto }}</span>
                    </div>
                  </div>
                </td>
                <td>
                  <span [class]="p.activo ? 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400' : 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400'"
                        class="px-2.5 py-0.5 rounded-full text-xs font-medium">
                    {{ p.activo ? 'Activo' : 'Inactivo' }}
                  </span>
                </td>
                <td class="pe-4 text-right">
                  <button [routerLink]="['/editar-proveedor', p.id]" 
                          class="inline-flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors dark:bg-blue-900/30 dark:text-blue-400 dark:hover:bg-blue-900/50">
                    <i class="fa-solid fa-pen text-xs"></i>
                    <span>Editar</span>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <app-paginador 
          [totalElementos]="totalElementos"
          [totalPaginas]="totalPaginas"
          [paginaActual]="paginaActual"
          [tamanoPagina]="tamanoPagina"
          (cambioPagina)="onCambioPagina($event)"
          (cambioTamano)="onCambioTamano($event)">
        </app-paginador>
      </div>
    </div>
  </div>
</div>
