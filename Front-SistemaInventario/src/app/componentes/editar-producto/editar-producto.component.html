<form [formGroup]="form" (ngSubmit)="editar()" class="container mt-4">
  <div class="mb-3">
    <label>Nombre</label>
    <input formControlName="nombre" class="form-control" />
  </div>

  <div class="mb-3">
    <label>Descripción</label>
    <input formControlName="descripcion" class="form-control" />
  </div>

  <div class="mb-3">
    <label>SKU</label>
    <input formControlName="sku" class="form-control" />
  </div>

  <div class="mb-3">
    <label>Unidad de Medida Base</label>
    <select formControlName="unidadMedidaBase" class="form-select">
      <option value="UND">Unidades</option>
      <option value="KG">Kilogramos</option>
      <option value="MT">Metros</option>
      <option value="LT">Litros</option>
    </select>
  </div>

  <div class="mb-3">
    <label>Precio Costo Promedio</label>
    <input type="number" formControlName="precioCostoPromedio" class="form-control" />
  </div>

  <div class="mb-3">
    <label>Stock Actual (En esta sucursal)</label>
    <input type="number" formControlName="stock" class="form-control" />
  </div>

  <!-- Sucursal -->
  <div class="mb-3">
    <label class="form-label fw-semibold">Sucursal <span class="text-danger">*</span></label>
    <select formControlName="idSucursal" class="form-select"
      [class.is-invalid]="form.get('idSucursal')?.invalid && form.get('idSucursal')?.touched">
      <option value="">-- Seleccione una sucursal --</option>
      <option *ngFor="let suc of sucursales" [value]="suc.id">{{ suc.nombre }}</option>
    </select>
    <div class="invalid-feedback">Seleccione una sucursal válida.</div>
  </div>

  <!-- Proveedor -->
  <div class="mb-3">
    <label class="form-label fw-semibold">Proveedor <span class="text-danger">*</span></label>
    <select formControlName="idProveedor" class="form-select"
      [class.is-invalid]="form.get('idProveedor')?.invalid && form.get('idProveedor')?.touched">
      <option [ngValue]="null">-- Seleccione un proveedor --</option>
      <option *ngFor="let prov of proveedores" [ngValue]="prov.id">
        {{ prov.label }}
      </option>
    </select>
    <div class="invalid-feedback">Seleccione un proveedor válido.</div>
  </div>

  <!-- Activo -->
  <div class="mb-3">
    <div class="form-check form-switch">
      <input formControlName="activo" class="form-check-input" type="checkbox" id="activoSwitch" />
      <label class="form-check-label fw-semibold" for="activoSwitch">Producto Activo</label>
    </div>
    <small class="text-muted">Indica si el producto está disponible en el sistema.</small>
  </div>

  <div class="mb-3">
    <label class="fw-semibold">Motivo del Cambio <span class="text-danger">*</span></label>
    <textarea formControlName="razonCambio" class="form-control" rows="3" placeholder="Escriba la razón de la actualización..."></textarea>
    <div *ngIf="form.get('razonCambio')?.invalid && form.get('razonCambio')?.touched" class="text-danger small">
      El motivo es obligatorio y debe tener al menos 5 caracteres.
    </div>
  </div>

  <div class="text-center gap-2 d-flex justify-content-center">
    <button class="btn btn-primary" type="submit">Actualizar Producto</button>
    <a routerLink="/gestion-producto" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
