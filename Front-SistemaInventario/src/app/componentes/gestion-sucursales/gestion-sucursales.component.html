<div class="container mt-5 px-4 sm:px-6 lg:px-8 pb-10">
  <div class="sm:flex sm:items-center sm:justify-between border-b pb-5 border-gray-200">
    <div class="min-w-0 flex-1">
      <h2 class="text-2xl font-bold leading-7 text-black sm:truncate sm:text-3xl sm:tracking-tight">Gestión de Sucursales y Almacenes</h2>
      <p class="mt-1 text-sm text-black">Configure los puntos de venta y centros de distribución de la red logística.</p>
    </div>
    <div class="mt-4 flex sm:ml-4 sm:mt-0 gap-2">
      <button type="button" class="inline-flex items-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 transition-all">Exportar PDF</button>
      <button type="button" class="inline-flex items-center rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 transition-all">Añadir Sucursal</button>
    </div>
  </div>

  <div class="mt-8 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
    <!-- Branch Card Example 1 -->
    <div class="group relative flex flex-col overflow-hidden rounded-2xl border border-gray-100 bg-white p-6 shadow-sm transition-all hover:shadow-lg">
      <div class="flex items-center justify-between mb-6">
        <div class="h-12 w-12 rounded-xl bg-blue-100 flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M11.47 3.84a.75.75 0 011.06 0l8.69 8.69a.75.75 0 101.06-1.06l-8.689-8.69a2.25 2.25 0 00-3.182 0l-8.69 8.69a.75.75 0 001.061 1.06l8.69-8.69z" /></svg>
        </div>
        <span class="inline-flex items-center rounded-full bg-green-50 px-2 py-1 text-xs font-medium text-green-700 ring-1 ring-inset ring-green-600/20">Activa</span>
      </div>
      <div>
        <h3 class="text-lg font-bold text-black">Sucursal Central</h3>
        <p class="mt-1 text-sm text-black">Av. Principal 123, Distrito Capital</p>
      </div>
      <div class="mt-6 border-t border-gray-50 pt-4 flex items-center justify-between">
        <div class="text-xs text-gray-400">
          <span class="font-bold">Capacidad:</span> 85% llena
        </div>
        <button class="text-sm font-medium text-blue-600 hover:text-blue-500">Configurar</button>
      </div>
    </div>

    <!-- Branch Card Example 2 -->
    <div class="group relative flex flex-col overflow-hidden rounded-2xl border border-gray-100 bg-white p-6 shadow-sm transition-all hover:shadow-lg">
      <div class="flex items-center justify-between mb-6">
        <div class="h-12 w-12 rounded-xl bg-gray-100 flex items-center justify-center text-gray-500 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 9a.75.75 0 00-1.5 0v2.25H9a.75.75 0 000 1.5h2.25V15a.75.75 0 001.5 0v-2.25H15a.75.75 0 000-1.5h-2.25V9z" /></svg>
        </div>
        <span class="inline-flex items-center rounded-full bg-yellow-50 px-2 py-1 text-xs font-medium text-yellow-700 ring-1 ring-inset ring-yellow-600/20">Mantenimiento</span>
      </div>
      <div>
        <h3 class="text-lg font-bold text-black">Almacén Regional Norte</h3>
        <p class="mt-1 text-sm text-black">Km 15 Autopista Norte</p>
      </div>
      <div class="mt-6 border-t border-gray-50 pt-4 flex items-center justify-between">
        <div class="text-xs text-gray-400">
          <span class="font-bold">Capacidad:</span> 40% llena
        </div>
        <button class="text-sm font-medium text-blue-600 hover:text-blue-500">Configurar</button>
      </div>
    </div>
  </div>
</div>
