<div class="container mt-5">
  <div class="card bg-white rounded-xl shadow-md overflow-hidden">
    <div class="card-header bg-gradient-to-tr from-blue-600 to-blue-400 p-6">
      <h5 class="text-white text-xl font-semibold flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path fill-rule="evenodd" d="M15.91 3.912a.75.75 0 01.907.365l2.25 4.5a.75.75 0 01-.136.872l-4.5 4.5a.75.75 0 11-1.06-1.06l3.22-3.22H8.25a.75.75 0 010-1.5h8.384l-3.22-3.22a.75.75 0 01-.136-.872l2.25-4.5a.75.75 0 01.382-.365z" clip-rule="evenodd" /></svg>
        Movimientos de Inventario (Entradas/Salidas)
      </h5>
    </div>

    <div class="card-body p-6">
      <div class="flex justify-between items-center mb-6">
        <div class="flex gap-2">
          <button class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M12 3.75a.75.75 0 01.75.75v6.75h6.75a.75.75 0 010 1.5h-6.75v6.75a.75.75 0 01-1.5 0v-6.75H4.5a.75.75 0 010-1.5h6.75V4.5a.75.75 0 01.75-.75z" clip-rule="evenodd" /></svg>
            Registrar Entrada
          </button>
          <button class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M3.75 12a.75.75 0 01.75-.75h15a.75.75 0 010 1.5h-15a.75.75 0 01-.75-.75z" clip-rule="evenodd" /></svg>
            Registrar Salida
          </button>
        </div>
        <div class="relative">
          <input type="text" placeholder="Buscar movimientos..." class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
        </div>
      </div>

      <div class="overflow-x-auto rounded-lg border border-gray-200">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-black uppercase tracking-wider">Fecha</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-black uppercase tracking-wider">Producto</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-black uppercase tracking-wider">Tipo</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-black uppercase tracking-wider">Cantidad</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-black uppercase tracking-wider">Responsable</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-black uppercase tracking-wider">Sucursal</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200">
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4 whitespace-nowrap text-sm text-black">2024-04-01 10:30</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-black">Martillo Pro S</td>
              <td class="px-6 py-4 whitespace-nowrap">
                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Entrada</span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-black">50 unidades</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-black">Juan Pérez</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-black">Central Norte</td>
            </tr>
            <!-- More rows placeholder -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
